<!DOCTYPE html>

<html>
<head>
    <title>User Login</title>


<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        height: 100vh;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .login-card {
        background: white;
        padding: 30px;
        border-radius: 10px;
        width: 320px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
        color: #333;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    .password-container {
        position: relative;
    }

    .toggle-btn {
        position: absolute;
        right: 10px;
        top: 12px;
        cursor: pointer;
        font-size: 14px;
        color: #2575fc;
    }

    button {
        width: 100%;
        padding: 10px;
        background: #2575fc;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: #1a5ed9;
    }

    .link {
        margin-top: 10px;
        display: block;
        color: #2575fc;
        text-decoration: none;
    }

    .error {
        color: red;
        font-size: 14px;
    }
</style>


</head>

<body>

<div class="login-card">


<h2>🗳 User Login</h2>

{% if form.errors %}
    <p class="error">Invalid username or password</p>
{% endif %}

<form method="post">
    {% csrf_token %}

    <!-- Username -->
    <input type="text" name="username" placeholder="Enter Username" required>

    <!-- Password with toggle -->
    <div class="password-container">
        <input type="password" id="password" name="password" placeholder="Enter Password" required>
        <span class="toggle-btn" onclick="togglePassword()">Show</span>
    </div>

    <button type="submit">Login</button>
</form>

<a href="/register/" class="link">New user? Register</a>


</div>

<script>
    function togglePassword() {
        const pwd = document.getElementById("password");
        const btn = document.querySelector(".toggle-btn");

        if (pwd.type === "password") {
            pwd.type = "text";
            btn.textContent = "Hide";
        } else {
            pwd.type = "password";
            btn.textContent = "Show";
        }
    }
</script>

</body>
</html>
