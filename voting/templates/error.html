<!DOCTYPE html>

<html>
<head>
    <title>Error</title>


<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        height: 100vh;
        background: linear-gradient(135deg, #ff416c, #ff4b2b);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .error-card {
        background: white;
        padding: 30px;
        border-radius: 10px;
        width: 350px;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .icon {
        font-size: 40px;
        margin-bottom: 10px;
    }

    h2 {
        margin-bottom: 10px;
        color: #e74c3c;
    }

    p {
        color: #555;
        margin-bottom: 20px;
    }

    .btn {
        display: inline-block;
        padding: 10px 15px;
        background: #2575fc;
        color: white;
        text-decoration: none;
        border-radius: 5px;
    }

    .btn:hover {
        background: #1a5ed9;
    }
</style>


</head>

<body>

<div class="error-card">


<div class="icon">⚠️</div>

<h2>Something went wrong</h2>

<p>{{ message }}</p>

<a href="/" class="btn">Go Back to Home</a>


</div>

</body>
</html>
