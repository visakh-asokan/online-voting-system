<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
    :root {
        --primary:      #1d4ed8;
        --primary-pale: #eff6ff;
        --primary-ring: rgba(29,78,216,0.2);
        --text:         #0f172a;
        --text-muted:   #64748b;
        --border:       #e2e8f0;
        --card-shadow:  0 1px 3px rgba(0,0,0,0.06), 0 4px 24px rgba(0,0,0,0.08);
        --radius:       14px;
    }

    *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 15px;
        background: #f1f5f9;
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    /* ── Header ── */
    .header {
        background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 60%, #2563eb 100%);
        color: white;
        padding: 0 28px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 2px 12px rgba(29,78,216,0.25);
        flex-shrink: 0;
    }

    .header-brand {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: -0.3px;
    }

    .header-back {
        color: rgba(255,255,255,0.85);
        text-decoration: none;
        font-size: 13px;
        font-weight: 600;
        padding: 7px 16px;
        border-radius: 8px;
        border: 1.5px solid rgba(255,255,255,0.25);
        transition: background 0.2s, border-color 0.2s;
    }

    .header-back:hover {
        background: rgba(255,255,255,0.12);
        border-color: rgba(255,255,255,0.5);
    }

    /* ── Page Body ── */
    .page-body {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }

    /* ── Card ── */
    .card {
        background: white;
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        padding: 36px 32px;
        width: 100%;
        max-width: 420px;
        box-shadow: var(--card-shadow);
        animation: fadeUp 0.3s ease both;
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .card-icon {
        width: 48px;
        height: 48px;
        background: var(--primary-pale);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        margin-bottom: 18px;
    }

    .card h2 {
        font-size: 20px;
        font-weight: 800;
        letter-spacing: -0.3px;
        color: var(--text);
        margin-bottom: 6px;
    }

    .card .desc {
        font-size: 14px;
        color: var(--text-muted);
        margin-bottom: 28px;
        line-height: 1.5;
    }

    /* ── Django form.as_p overrides ── */
    form p {
        margin-bottom: 18px;
    }

    form p:last-of-type {
        margin-bottom: 0;
    }

    form label {
        display: block;
        font-size: 13px;
        font-weight: 700;
        color: #334155;
        margin-bottom: 7px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
    }

    form input[type="password"],
    form input[type="text"] {
        width: 100%;
        padding: 10px 14px;
        border: 1.5px solid var(--border);
        border-radius: 9px;
        font-size: 14px;
        font-family: 'Plus Jakarta Sans', sans-serif;
        color: var(--text);
        background: #fafbfc;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
    }

    form input[type="password"]:focus,
    form input[type="text"]:focus {
        border-color: var(--primary);
        background: white;
        box-shadow: 0 0 0 3px var(--primary-ring);
    }

    /* Help text Django renders inside <span class="helptext"> or <ul class="errorlist"> */
    form .helptext,
    form span.helptext {
        display: block;
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 6px;
        line-height: 1.5;
    }

    form ul.errorlist {
        list-style: none;
        margin-top: 6px;
    }

    form ul.errorlist li {
        font-size: 12px;
        color: #b91c1c;
        font-weight: 600;
    }

    /* ── Submit Button ── */
    .btn-submit {
        width: 100%;
        padding: 13px;
        background: linear-gradient(135deg, #1d4ed8, #2563eb);
        color: white;
        border: none;
        border-radius: 9px;
        font-size: 15px;
        font-weight: 700;
        font-family: 'Plus Jakarta Sans', sans-serif;
        cursor: pointer;
        margin-top: 24px;
        box-shadow: 0 4px 14px rgba(29,78,216,0.3);
        transition: opacity 0.2s, transform 0.15s, box-shadow 0.15s;
        letter-spacing: 0.1px;
    }

    .btn-submit:hover {
        opacity: 0.92;
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(29,78,216,0.35);
    }

    .btn-submit:active {
        transform: translateY(0);
    }
</style>
</head>

<body>

<!-- Header -->
<div class="header">
    <div class="header-brand">🗳 Voting System</div>
    <a href="/" class="header-back">← Back to Home</a>
</div>

<!-- Page Body -->
<div class="page-body">
    <div class="card">
        <div class="card-icon">🔐</div>
        <h2>Change Password</h2>
        <p class="desc">Choose a strong new password to keep your account secure.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-submit">Update Password</button>
        </form>
    </div>
</div>

</body>
</html>
