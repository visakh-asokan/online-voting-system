<!DOCTYPE html>

<html>
<head>
    <title>Register</title>


<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        height: 100vh;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .register-card {
        background: white;
        padding: 30px;
        border-radius: 10px;
        width: 350px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
        color: #333;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    .password-container {
        position: relative;
    }

    .toggle-btn {
        position: absolute;
        right: 10px;
        top: 12px;
        cursor: pointer;
        font-size: 14px;
        color: #185a9d;
    }

    button {
        width: 100%;
        padding: 10px;
        background: #185a9d;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: #144a82;
    }

    .link {
        margin-top: 10px;
        display: block;
        color: #185a9d;
        text-decoration: none;
    }

    .error {
        color: red;
        font-size: 14px;
    }

    .success {
        color: green;
        font-size: 14px;
    }
</style>


</head>

<body>

<div class="register-card">


<h2>📝 Register</h2>

{% if messages %}
    {% for message in messages %}
        <p class="{{ message.tags }}">{{ message }}</p>
    {% endfor %}
{% endif %}

<form method="post">
    {% csrf_token %}

    <!-- Username -->
    <input type="text" name="username" placeholder="Enter Username" required>

    <!-- Email -->
    <input type="email" name="email" placeholder="Enter College Email" required>

    <!-- Password -->
    <div class="password-container">
        <input type="password" id="password" name="password" placeholder="Enter Password" required>
        <span class="toggle-btn" onclick="togglePassword('password', this)">Show</span>
    </div>

    <!-- Confirm Password -->
    <div class="password-container">
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
        <span class="toggle-btn" onclick="togglePassword('confirm_password', this)">Show</span>
    </div>

    <button type="submit">Register</button>
</form>

<a href="/login/" class="link">Already have an account? Login</a>


</div>

<script>
    function togglePassword(fieldId, btn) {
        const field = document.getElementById(fieldId);

        if (field.type === "password") {
            field.type = "text";
            btn.textContent = "Hide";
        } else {
            field.type = "password";
            btn.textContent = "Show";
        }
    }
</script>

</body>
</html>
