<!DOCTYPE html>

<html>
<head>
    <title>Delete Election</title>


<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        height: 100vh;
        background: linear-gradient(135deg, #ff416c, #ff4b2b);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .card {
        background: white;
        padding: 30px;
        border-radius: 12px;
        width: 380px;
        text-align: center;
        box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }

    .icon {
        font-size: 45px;
        margin-bottom: 10px;
    }

    h2 {
        margin-bottom: 10px;
        color: #e74c3c;
    }

    p {
        color: #555;
        margin-bottom: 20px;
        line-height: 1.5;
    }

    strong {
        color: #000;
    }

    /* Button container */
    .btn-group {
        display: flex;
        justify-content: center;
        gap: 15px;
    }

    .btn {
        padding: 10px 18px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        min-width: 120px;
    }

    .btn-delete {
        background-color: #e74c3c;
        color: white;
    }

    .btn-delete:hover {
        background-color: #c0392b;
    }

    .btn-cancel {
        background-color: #3498db;
        color: white;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    .btn-cancel:hover {
        background-color: #2980b9;
    }
</style>


</head>

<body>

<div class="card">


<div class="icon">⚠️</div>

<h2>Delete Election</h2>

<p>
    Are you sure you want to delete  
    <strong>"{{ election.title }}"</strong>?  
    <br><br>
    This action <b>cannot be undone</b>.
</p>

<div class="btn-group">

    <!-- Delete -->
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-delete">
            Delete
        </button>
    </form>

    <!-- Cancel -->
    <a href="/admin-dashboard/" class="btn btn-cancel">
        Cancel
    </a>

</div>


</div>

</body>
</html>
